name: Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Deploy por FTP
        run: |
          lftp -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASS }}" ${{ secrets.FTP_HOST }} <<EOF
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 3
          put -O /public_html index.html
          put -O /public_html projects-data.js
          bye
          EOF
